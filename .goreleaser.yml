version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: vmt
    main: ./cmd/vmt
    binary: vmt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: vmt
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: vmt
    homepage: https://github.com/matsubo/voice-memo-stt
    description: Voice Memos transcription CLI
    license: MIT
    repository:
      owner: matsubo
      name: homebrew-tap

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
